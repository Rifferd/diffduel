<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DiffDuel — страница не найдена</title>
<meta name="theme-color" content="#161B22">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@110,500..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="../../manifest.webmanifest">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="_pageshell.css">
<style>
  .err-code { font: 700 clamp(56px,12vw,120px)/1 var(--font-mono); font-variant-numeric: tabular-nums; color: var(--minus-bright); }
  .err-line { font: 500 14px var(--font-mono); color: var(--arena-soft); margin: 8px 0 4px; }
  .err-title { font: 800 26px var(--font-display); font-stretch: 110%; margin-bottom: 8px; }
  .err-states { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; margin-top: 28px; }
  .err-chip { border: 1px solid var(--arena-line); border-radius: var(--radius-pill); padding: 6px 14px; font: 600 12px var(--font-mono); color: var(--arena-soft); }
  .err-chip.is-on { border-color: var(--minus); color: var(--minus-bright); }
  .err-status { font-size: 12px; color: var(--arena-soft); }
  .err-status b { color: var(--minus-bright); font-weight: 500; }
  .err-text { color: var(--arena-soft); font-size: 15px; max-width: 42ch; margin: 0 auto; }
  .err-actions { display: flex; gap: 10px; justify-content: center; margin-top: 22px; flex-wrap: wrap; }
</style>
</head>
<body class="arena-screen">
  <div class="arena-screen__bar">
    <a class="arena-screen__logo" href="landing.html"><span class="vs">VS</span>DiffDuel</a>
    <span class="mono err-status">status: <b>degraded</b></span>
  </div>
  <main class="arena-screen__body">
    <div style="max-width:480px">
      <div class="err-line">// route not found</div>
      <h1><span class="sr-only">Страница не найдена — ошибка 404</span><span class="err-code" aria-hidden="true">− 404</span></h1>
      <div class="err-title">Страница не найдена</div>
      <p class="err-text">Похоже, этот diff не сматчился. Вернитесь на главную и вызовите кого-нибудь на дуэль.</p>
      <div class="err-actions">
        <a class="btn btn--duel" href="app-home.html">На главную</a>
        <a class="btn btn--dark-ghost" href="leaderboard.html">К лидерборду</a>
      </div>
      <div class="err-states">
        <span class="err-chip is-on">− 404 not found</span>
        <span class="err-chip">− 500 server error</span>
        <span class="err-chip">− offline</span>
      </div>
    </div>
  </main>
</body>
</html>
