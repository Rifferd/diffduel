<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>DiffDuel — нет соединения</title>
<meta name="theme-color" content="#161B22">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Archivo:wdth,wght@110,500..900&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<link rel="manifest" href="../../manifest.webmanifest">
<link rel="stylesheet" href="../../styles.css">
<link rel="stylesheet" href="_pageshell.css">
<style>
  .err-code { font: 700 clamp(48px,10vw,92px)/1 var(--font-mono); color: var(--timer); }
  .err-line { font: 500 14px var(--font-mono); color: var(--arena-soft); margin: 8px 0 4px; }
  .err-title { font: 800 26px var(--font-display); font-stretch: 110%; margin-bottom: 8px; }
  .err-status { font-size: 12px; color: var(--arena-soft); }
  .err-status b { color: var(--timer); font-weight: 500; }
  .err-text { color: var(--arena-soft); font-size: 15px; max-width: 40ch; margin: 0 auto; }
  .offline-banner { max-width: 340px; margin: 22px auto 0; justify-content: center; }
  .err-actions { margin-top: 18px; }
</style>
</head>
<body class="arena-screen">
  <div class="arena-screen__bar">
    <a class="arena-screen__logo" href="landing.html"><span class="vs">VS</span>DiffDuel</a>
    <span class="mono err-status">status: <b>offline</b></span>
  </div>
  <main class="arena-screen__body">
    <div style="max-width:460px">
      <div class="err-line">// network unreachable</div>
      <h1><span class="sr-only">Нет соединения с сетью</span><span class="err-code" aria-hidden="true">− offline</span></h1>
      <div class="err-title">Нет соединения</div>
      <p class="err-text">Дуэли требуют сети. Как только соединение вернётся, страница обновится автоматически. Пока можно посмотреть сохранённый профиль.</p>
      <div class="banner banner--warn offline-banner">
        <span class="banner__mark">!</span> Переподключаемся каждые 5 секунд…
      </div>
      <div class="err-actions"><a class="btn btn--dark-ghost" href="app-home.html">Повторить сейчас</a></div>
    </div>
  </main>
</body>
</html>
