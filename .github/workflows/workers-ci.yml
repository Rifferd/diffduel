name: workers-ci

on:
  push:
    branches: [main]
    paths:
      - "apps/workers/**"
      - ".github/workflows/workers-ci.yml"
  pull_request:
    branches: [main]
    paths:
      - "apps/workers/**"
      - ".github/workflows/workers-ci.yml"

concurrency:
  group: workers-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: apps/workers

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Install dependencies
        run: uv sync --dev

      - name: Ruff check
        run: uv run ruff check .

      - name: Ruff format check
        run: uv run ruff format --check .

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest
