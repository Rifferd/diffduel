# DiffDuel — DEV-стек инфраструктуры (PostgreSQL, Redis, Redpanda, MinIO).
#
# ВНИМАНИЕ: это файл ТОЛЬКО для локальной разработки.
#   - учётки/пароли — слабые, dev-уровня, заведомо известные (см. conventions.md);
#   - порты проброшены на host для удобства отладки;
#   - данные хранятся в named volumes (переживают `down`, чистятся `down -v`).
# Прод-конфигурация (TLS, секреты, реплики, бэкапы) живёт в ОТДЕЛЬНОМ
# оверлее (infra/deploy/*) и НЕ имеет ничего общего с этим файлом.
#
# Запуск: docker compose -f infra/compose/docker-compose.yml up -d
# (или из корня: make up)

name: diffduel

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: diffduel
      POSTGRES_PASSWORD: diffduel
      POSTGRES_DB: diffduel
      # Ускоряет init и делает поведение детерминированным в dev.
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U diffduel -d diffduel"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # dev: без пароля (см. conventions.md). appendonly для устойчивости данных между перезапусками.
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

  redpanda:
    image: docker.redpanda.com/redpandadata/redpanda:latest
    restart: unless-stopped
    command:
      - redpanda
      - start
      - --smp
      - "1"
      - --memory
      - 400M
      - --reserve-memory
      - 0M
      - --overprovisioned
      - --node-id
      - "0"
      - --kafka-addr
      - PLAINTEXT://0.0.0.0:9092,OUTSIDE://0.0.0.0:19092
      - --advertise-kafka-addr
      - PLAINTEXT://redpanda:9092,OUTSIDE://localhost:19092
    ports:
      # 9092 — для сервисов внутри docker-сети (advertise redpanda:9092);
      # 19092 — для процессов на host (advertise localhost:19092).
      - "19092:19092"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    healthcheck:
      test: ["CMD-SHELL", "rpk cluster health | grep -q 'Healthy:.*true'"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  minio:
    image: minio/minio:RELEASE.2025-04-22T22-12-26Z
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: diffduel
      MINIO_ROOT_PASSWORD: diffduel-dev-secret
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web-консоль
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # One-shot: идемпотентно создаёт бакеты и выставляет политики доступа.
  # Завершается с кодом 0 после применения — это нормально (service_completed_successfully).
  minio-init:
    image: minio/mc:RELEASE.2025-04-16T18-13-26Z
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e
        mc alias set local http://minio:9000 diffduel diffduel-dev-secret
        # Идемпотентное создание бакетов (--ignore-existing не падает, если уже есть).
        mc mb --ignore-existing local/avatars
        mc mb --ignore-existing local/share-cards
        mc mb --ignore-existing local/exports
        # avatars — приватный (доступ только через presigned URL).
        mc anonymous set none local/avatars
        # share-cards — публичное чтение (раздаются через CDN-префикс).
        mc anonymous set download local/share-cards
        # exports — приватный.
        mc anonymous set none local/exports
        echo "minio-init: бакеты готовы (avatars=private, share-cards=public-read, exports=private)"
    restart: "no"

volumes:
  postgres-data:
  redis-data:
  redpanda-data:
  minio-data:
