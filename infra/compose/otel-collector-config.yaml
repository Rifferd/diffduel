# OTel Collector (dev): принимает OTLP от сервисов, раздаёт по бэкендам.
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
    timeout: 2s

exporters:
  # Трейсы → Tempo (OTLP gRPC).
  otlp/tempo:
    endpoint: tempo:4317
    tls:
      insecure: true
  # Метрики → Prometheus scrape (collector публикует /metrics на :8889).
  prometheus:
    endpoint: 0.0.0.0:8889
  # Логи → Loki (OTLP-приём Loki по нативному пути).
  otlphttp/loki:
    endpoint: http://loki:3100/otlp

service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/tempo]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlphttp/loki]
