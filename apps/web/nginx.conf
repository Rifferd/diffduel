# SPA-раздача: history-fallback на index.html + кэш ассетов.
# API/WS проксирует Traefik на уровне выше — этот контейнер отдаёт только статику.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Хэшированные ассеты Vite — иммутабельны, кэшируем надолго.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Манифест/иконки PWA.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    # SPA history fallback — любые маршруты отдают index.html.
    # no-cache на точку входа: иначе браузер кэширует / и не видит новый деплой
    # (ассеты под /assets/ хэшированы и кэшируются отдельно как immutable).
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}
